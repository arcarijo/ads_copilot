# Weekly dependency updates, grouped so minor/patch bumps arrive as one PR that
# flows through the same CI + red-team gate as any other change.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # One combined PR for all action bumps, instead of one per action.
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
